/* ===== Data Preparation ===== */
function prepareData() {
  var xs = IRIS_DATA.map(function(row) {
    return [
      (row[0] - FEAT_MIN[0]) / (FEAT_MAX[0] - FEAT_MIN[0]),
      (row[1] - FEAT_MIN[1]) / (FEAT_MAX[1] - FEAT_MIN[1]),
      (row[2] - FEAT_MIN[2]) / (FEAT_MAX[2] - FEAT_MIN[2]),
      (row[3] - FEAT_MIN[3]) / (FEAT_MAX[3] - FEAT_MIN[3])
    ];
  });
  var ys = IRIS_DATA.map(function(row) {
    var idx = CLASSES.indexOf(row[4]);
    return [idx === 0 ? 1 : 0, idx === 1 ? 1 : 0, idx === 2 ? 1 : 0];
  });
  return {
    xs: tf.tensor2d(xs),
    ys: tf.tensor2d(ys),
    raw: xs
  };
}

function normalizeInput(vals) {
  return vals.map(function(v, i) {
    return (v - FEAT_MIN[i]) / (FEAT_MAX[i] - FEAT_MIN[i]);
  });
}

/* ===== Model ===== */
function buildModel() {
  var m = tf.sequential();
  m.add(tf.layers.dense({ inputShape: [4], units: 8, activation: 'relu' }));
  m.add(tf.layers.dense({ units: 3, activation: 'softmax' }));
  m.compile({
    optimizer: tf.train.adam(0.01),
    loss: 'categoricalCrossentropy',
    metrics: ['accuracy']
  });
  return m;
}

/* ===== SVG Helpers ===== */
function createSvg(width, height) {
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  return svg;
}

function svgLine(svg, x1, y1, x2, y2, color, sw) {
  var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', sw);
  line.setAttribute('opacity', '0.35');
  svg.appendChild(line);
}

function svgCircle(svg, cx, cy, r, cls) {
  var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', cx); c.setAttribute('cy', cy);
  c.setAttribute('r', r); c.setAttribute('class', cls);
  svg.appendChild(c);
}

function svgText(svg, x, y, text, opts) {
  opts = opts || {};
  var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('text-anchor', opts.anchor || 'middle');
  t.setAttribute('font-size', opts.size || 11);
  t.setAttribute('font-weight', opts.weight || 'normal');
  t.setAttribute('fill', opts.fill || '#2d3748');
  t.setAttribute('dominant-baseline', 'central');
  t.textContent = text;
  svg.appendChild(t);
}

function nodeClass(act) {
  if (act > 0.6) return 'node-hi';
  if (act > 0.3) return 'node-mid';
  return 'node-lo';
}

function drawNetworkSVG(hiddenActs, outputActs) {
  var W = 700, H = 380;
  var svg = createSvg(W, H);

  var lx = [70, 250, 430, 620];
  var layerSizes = [4, 8, 3, 3];  // input, hidden, output-raw, output-named
  var layerNames = ['Вхід', 'Прихований (relu)', 'Вихід (softmax)', ''];

  function yPos(n, idx) {
    var center = H / 2, gap = Math.min(42, (H - 60) / Math.max(n - 1, 1));
    if (n === 1) return [center];
    var span = (n - 1) * gap;
    var start = center - span / 2;
    var arr = [];
    for (var k = 0; k < n; k++) arr.push(start + k * gap);
    return arr;
  }

  var inputY = yPos(4, 0);
  var hiddenY = yPos(8, 1);
  var outputY = yPos(3, 2);

  // Layer labels
  for (var l = 0; l < 3; l++) {
    svgText(svg, lx[l], 18, layerNames[l], { size: 11, weight: '600', fill: '#718096' });
  }

  // Connections input->hidden (simplified: just draw all, uniform)
  var i, j;
  for (j = 0; j < 8; j++) {
    for (i = 0; i < 4; i++) {
      svgLine(svg, lx[0], inputY[i], lx[1], hiddenY[j], '#718096', 0.7);
    }
  }
  // Connections hidden->output
  for (j = 0; j < 3; j++) {
    for (i = 0; i < 8; i++) {
      svgLine(svg, lx[1], hiddenY[i], lx[2], outputY[j], '#718096', 0.7);
    }
  }

  // Input nodes (current slider values normalized)
  var sliderVals = getSliderValues();
  var normVals = normalizeInput(sliderVals);
  for (i = 0; i < 4; i++) {
    svgCircle(svg, lx[0], inputY[i], 16, nodeClass(normVals[i]));
    svgText(svg, lx[0], inputY[i], normVals[i].toFixed(2), { size: 9, weight: '600' });
    svgText(svg, lx[0] - 20, inputY[i], ['Чш.Д','Чш.Ш','Пл.Д','Пл.Ш'][i], {
      anchor: 'end', size: 10, fill: '#4a5568'
    });
  }

  // Hidden nodes
  for (i = 0; i < 8; i++) {
    var ha = hiddenActs ? hiddenActs[i] : 0;
    svgCircle(svg, lx[1], hiddenY[i], 14, nodeClass(ha));
    svgText(svg, lx[1], hiddenY[i], ha.toFixed(2), { size: 9, weight: '600' });
  }

  // Output nodes
  for (i = 0; i < 3; i++) {
    var oa = outputActs ? outputActs[i] : 0;
    svgCircle(svg, lx[2], outputY[i], 18, nodeClass(oa));
    svgText(svg, lx[2], outputY[i], (oa * 100).toFixed(0) + '%', { size: 9, weight: '700' });
    svgText(svg, lx[2] + 24, outputY[i], CLASSES[i], {
      anchor: 'start', size: 10, fill: CLASS_COLORS[i], weight: '600'
    });
  }

  var container = document.getElementById('network-svg');
  container.textContent = '';
  container.appendChild(svg);
}

/* ===== Sliders ===== */
function buildSliders() {
  var container = document.getElementById('slider-container');
  container.textContent = '';
  FEAT_NAMES.forEach(function(name, i) {
    var row = document.createElement('div');
    row.className = 'slider-row';

    var label = document.createElement('span');
    label.className = 'slider-label';
    label.textContent = name;

    var slider = document.createElement('input');
    slider.type = 'range';
    slider.id = 'sl' + i;
    slider.min = FEAT_MIN[i];
    slider.max = FEAT_MAX[i];
    slider.step = 0.1;
    // Default: midpoint
    slider.value = ((FEAT_MIN[i] + FEAT_MAX[i]) / 2).toFixed(1);

    var valEl = document.createElement('span');
    valEl.className = 'slider-val';
    valEl.id = 'slv' + i;
    valEl.textContent = slider.value;

    slider.addEventListener('input', function(idx, vel) {
      return function() { vel.textContent = this.value; };
    }(i, valEl));

    row.appendChild(label);
    row.appendChild(slider);
    row.appendChild(valEl);
    container.appendChild(row);
  });
}

function getSliderValues() {
  return FEAT_NAMES.map(function(_, i) {
    var el = document.getElementById('sl' + i);
    return el ? parseFloat(el.value) : (FEAT_MIN[i] + FEAT_MAX[i]) / 2;
  });
}

/* ===== Result Rendering ===== */
function renderResult(probs, model) {
  var maxIdx = 0;
  probs.forEach(function(p, i) { if (p > probs[maxIdx]) maxIdx = i; });

  var resultClass = document.getElementById('result-class');
  resultClass.textContent = CLASSES[maxIdx];
  resultClass.style.color = CLASS_COLORS[maxIdx];

  var probBars = document.getElementById('prob-bars');
  probBars.textContent = '';
  probs.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'prob-row';

    var name = document.createElement('span');
    name.className = 'prob-name';
    name.textContent = CLASSES[i];

    var track = document.createElement('div');
    track.className = 'prob-track';
    var fill = document.createElement('div');
    fill.className = 'prob-fill';
    fill.style.width = (p * 100).toFixed(1) + '%';
    fill.style.background = CLASS_COLORS[i];
    track.appendChild(fill);

    var pct = document.createElement('span');
    pct.className = 'prob-pct';
    pct.textContent = (p * 100).toFixed(1) + '%';

    row.appendChild(name);
    row.appendChild(track);
    row.appendChild(pct);
    probBars.appendChild(row);
  });
}

/* ===== Classify ===== */
function classify(model) {
  var vals = getSliderValues();
  var norm = normalizeInput(vals);

  tf.tidy(function() {
    var input = tf.tensor2d([norm]);
    var vizModel = tf.model({
      inputs: model.inputs,
      outputs: [model.layers[0].output, model.layers[1].output]
    });
    var results = vizModel.predict(input);
    var hiddenArr = Array.from(results[0].dataSync());
    var outputArr = Array.from(results[1].dataSync());

    renderResult(outputArr, model);
    drawNetworkSVG(hiddenArr, outputArr);
  });
}

/* ===== Accuracy Table ===== */
function buildAccuracyTable(model, data) {
  var predictions = tf.tidy(function() {
    return model.predict(data.xs);
  });
  var predArray = predictions.arraySync();
  predictions.dispose();

  var correct = 0;
  var tbody = document.getElementById('accuracy-body');
  tbody.textContent = '';

  IRIS_DATA.forEach(function(row, idx) {
    var probs = predArray[idx];
    var predIdx = 0;
    probs.forEach(function(p, i) { if (p > probs[predIdx]) predIdx = i; });
    var actualIdx = CLASSES.indexOf(row[4]);
    var ok = predIdx === actualIdx;
    if (ok) correct++;

    var tr = document.createElement('tr');
    var td0 = document.createElement('td'); td0.textContent = idx + 1; tr.appendChild(td0);
    for (var fi = 0; fi < 4; fi++) {
      var td = document.createElement('td'); td.textContent = row[fi]; tr.appendChild(td);
    }
    var tdA = document.createElement('td'); tdA.textContent = row[4]; tr.appendChild(tdA);
    var tdP = document.createElement('td');
    tdP.textContent = CLASSES[predIdx] + (ok ? ' \u2713' : ' \u2717');
    tdP.className = ok ? 'cell-correct' : 'cell-wrong';
    tr.appendChild(tdP);
    tbody.appendChild(tr);
  });

  var pct = (correct / IRIS_DATA.length * 100).toFixed(1);
  document.getElementById('accuracy-summary').textContent =
    '\u0422\u043e\u0447\u043d\u0456\u0441\u0442\u044c: ' + correct + '/150 (' + pct + '%)';
}

/* ===== Training Progress ===== */
function updateProgress(epoch, logs) {
  var pct = ((epoch + 1) / 150 * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  var acc = logs.acc !== undefined ? logs.acc : logs.accuracy;
  var accPct = acc !== undefined ? (acc * 100).toFixed(1) : '?';
  document.getElementById('progress-status').textContent =
    'Епоха ' + (epoch + 1) + '/150 — втрати: ' + logs.loss.toFixed(4) + ' — точність: ' + accPct + '%';
}

/* ===== After Training ===== */
function onTrainingComplete(model, data) {
  document.getElementById('progress-status').textContent = 'Навчання завершено!';
  document.getElementById('progress-bar').style.width = '100%';

  ['classifier-card', 'viz-card', 'accuracy-card'].forEach(function(id) {
    document.getElementById(id).classList.remove('hidden');
  });

  buildAccuracyTable(model, data);

  // Initial classify + SVG with default slider values
  classify(model);

  document.getElementById('classify-btn').addEventListener('click', function() {
    classify(model);
  });
}

/* ===== Init ===== */
buildSliders();

(async function() {
  var data = prepareData();
  var model = buildModel();
  await model.fit(data.xs, data.ys, {
    epochs: 150,
    batchSize: 32,
    shuffle: true,
    callbacks: { onEpochEnd: updateProgress }
  });
  onTrainingComplete(model, data);
  data.xs.dispose();
  data.ys.dispose();
})();
</script>
